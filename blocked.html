<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rhythm — You're Protected</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --w:#fff;--off:#f7f8f5;--paper:#eef0eb;--mist:#d4d8cf;--mid:#8c9488;--dim:#5a6058;
  --g:#2d5a3d;--gm:#3d7a54;--gl:#6aab82;--gs:rgba(45,90,61,.08);--gb:rgba(45,90,61,.22);
  --b:#7c2035;--bm:#9e2a43;--bs:rgba(124,32,53,.08);--bb:rgba(124,32,53,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--off);color:var(--g);
  font-family:"DM Sans",sans-serif;font-weight:300;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:2rem;position:relative;overflow:hidden}
body::before{content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse 50% 50% at 50% 60%,rgba(45,90,61,.05) 0%,transparent 70%);
  pointer-events:none}
/* Breathing rings */
.rings{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.07}
.ring{position:absolute;border-radius:50%;border:1px solid var(--g);
  top:50%;left:50%;transform:translate(-50%,-50%);animation:breathe 6s ease-in-out infinite}
.ring:nth-child(1){width:280px;height:280px;animation-delay:0s}
.ring:nth-child(2){width:460px;height:460px;animation-delay:1s}
.ring:nth-child(3){width:640px;height:640px;animation-delay:2s}
.ring:nth-child(4){width:820px;height:820px;animation-delay:3s}
.ring:nth-child(5){width:1000px;height:1000px;animation-delay:4s}
@keyframes breathe{
  0%,100%{opacity:.9;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:.2;transform:translate(-50%,-50%) scale(1.03)}}
/* Card */
.card{position:relative;z-index:1;background:var(--w);border:1px solid var(--mist);
  border-radius:8px;max-width:520px;width:100%;padding:3rem 2.5rem;text-align:center;
  box-shadow:0 4px 32px rgba(45,90,61,.1);animation:rise .6s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:"Cormorant Garamond",serif;font-size:1rem;font-weight:300;
  letter-spacing:.2em;color:var(--mid);text-transform:uppercase;margin-bottom:2.5rem}
.logo span{color:var(--b)}
/* Icon */
.icon-wrap{width:72px;height:72px;border-radius:50%;background:var(--gs);
  border:1px solid var(--gb);display:grid;place-items:center;
  margin:0 auto 1.75rem;font-size:1.8rem;
  animation:icon-pulse 3s ease-in-out infinite}
@keyframes icon-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(45,90,61,.12)}
  50%{box-shadow:0 0 0 14px rgba(45,90,61,0)}}
h1{font-family:"Cormorant Garamond",serif;font-size:2.2rem;font-weight:300;
  color:var(--g);line-height:1.15;margin-bottom:.75rem}
h1 em{font-style:italic;color:var(--b)}
.blocked-site{font-size:.75rem;color:var(--mid);letter-spacing:.08em;
  margin-bottom:1.5rem;font-family:monospace}
.sep{width:2.5rem;height:1px;background:var(--mist);margin:0 auto 1.5rem}
/* Affirmation */
.affirmation{background:var(--gs);border:1px solid var(--gb);
  border-radius:6px;padding:1.1rem 1.4rem;margin-bottom:1.75rem}
.affirmation p{font-family:"Cormorant Garamond",serif;font-style:italic;
  font-size:1.05rem;color:var(--dim);line-height:1.65}
.affirmation cite{display:block;font-style:normal;font-size:.68rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--g);margin-top:.6rem}
/* Actions */
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.btn-back{background:var(--g);color:#fff;border:none;padding:.75rem 1.75rem;
  font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;font-family:"DM Sans",sans-serif;border-radius:6px;transition:all .3s}
.btn-back:hover{background:var(--gm);transform:translateY(-1px)}
.btn-dash{background:transparent;color:var(--b);border:1px solid var(--bb);
  padding:.75rem 1.75rem;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;font-family:"DM Sans",sans-serif;border-radius:6px;transition:all .3s}
.btn-dash:hover{background:var(--bs);border-color:var(--b)}
.footer-note{font-size:.7rem;color:var(--mid);letter-spacing:.04em}
.footer-note a{color:var(--g);text-decoration:none;border-bottom:1px solid var(--gb);transition:color .2s}
.footer-note a:hover{color:var(--b)}
/* Breathe prompt */
.breathe{margin-top:2rem;font-size:.68rem;color:var(--mist);letter-spacing:.18em;
  text-transform:uppercase;animation:fb 4s ease-in-out infinite}
@keyframes fb{0%,100%{opacity:.3}50%{opacity:.9}}
@media(max-width:540px){.card{padding:2rem 1.5rem}h1{font-size:1.8rem}}
</style>
</head>
<body>
<div class="rings">
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div>
</div>
<div class="card">
  <div class="logo">Rhythm<span>.</span></div>
  <div class="icon-wrap" id="blockIcon">🌿</div>
  <h1>You were <em>protected.</em></h1>
  <p class="blocked-site" id="blockedSite">Loading…</p>
  <div class="sep"></div>
  <div class="affirmation">
    <p id="affirmText">"The version of you that set this block was thinking clearly. Trust that person."</p>
    <cite>— Rhythm</cite>
  </div>
  <div class="actions">
    <button class="btn-back" id="goBackBtn" type="button">← Go back</button>
    <button class="btn-dash" id="openDashBtn" type="button">Open Dashboard</button>
  </div>
  <p class="footer-note">This site is on your block list. <a href="#" id="editSettingsLink">Edit your settings</a></p>
  <div class="breathe">Breathe in · Breathe out</div>
</div>
<script src="blocked.js"></script>
</body>
</html>
